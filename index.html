<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Calculator</title>
    <style>
        :root { --bg-black: #000000; --btn-gray: #1c1c1e; --text-white: #ffffff; --text-dim: #8e8e93; --accent-orange: #f39c12; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; background-color: var(--bg-black); font-family: sans-serif; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #secret-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #secret-overlay input { width: 80%; padding: 15px; border-radius: 10px; background: #222; color: white; font-size: 2rem; text-align: center; margin-bottom: 20px; outline: none; border: 1px solid #444; }
        .top-nav { display: flex; justify-content: space-between; padding: 20px; padding-top: 25px; }
        .icon-svg { width: 22px; height: 22px; fill: var(--text-dim); }
        #display-container { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 20px 30px; overflow: hidden; width: 100%; }
        #result { font-size: 5rem; color: var(--text-white); font-weight: 200; text-align: right; white-space: nowrap; overflow-x: auto; width: 100%; scrollbar-width: none; }
        #keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 15px; padding-bottom: 30px; }
        button { aspect-ratio: 1/1; border-radius: 50%; border: none; background-color: var(--btn-gray); color: var(--text-white); font-size: 1.8rem; position: relative; outline: none; }
        button:active { background-color: #3a3a3c; }
        .op-text { color: var(--accent-orange); font-size: 2.2rem; }
        .util-text { color: var(--text-dim); }
        .equals-btn { background-color: var(--accent-orange); }
        #tap-cue { position: absolute; bottom: 12px; left: 12px; color: #2c2c2e; font-size: 0.75rem; display: none; }
    </style>
</head>
<body id="calc-body">

<div id="secret-overlay">
    <p>Set Toxic Force</p>
    <input type="number" id="force-input" placeholder="0">
    <button onclick="saveToxicValue()" style="width:120px; height:50px; aspect-ratio:auto; border-radius:10; background:var(--accent-orange)">SAVE</button>
</div>

<div class="top-nav">
    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    <svg class="icon-svg" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-8 4h2v2h-2V7zm0 4h2v2h-2v-2zm-4-4h2v2H7V7zm0 4h2v2H7v-2zm0 4h2v2H7v-2zm10 2h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
</div>

<div id="display-container"><div id="result">0</div></div>

<div id="keypad">
    <button class="util-text" id="btn-c" onclick="handleButton('C')">C</button>
    <button class="util-text" onclick="handleButton('%')">%</button>
    <button onclick="handleButton('back')">⌫</button>
    <button class="op-text" id="btn-div" onclick="handleButton('÷')">÷</button>
    <button onclick="handleButton('7')">7</button><button onclick="handleButton('8')">8</button><button onclick="handleButton('9')">9</button>
    <button class="op-text" id="btn-mul" onclick="handleButton('×')">×</button>
    <button onclick="handleButton('4')">4</button><button onclick="handleButton('5')">5</button><button onclick="handleButton('6')">6</button>
    <button class="op-text" id="btn-sub" onclick="handleButton('-')">-</button>
    <button onclick="handleButton('1')">1</button><button onclick="handleButton('2')">2</button><button onclick="handleButton('3')">3</button>
    <button class="op-text" id="btn-add" onclick="handleButton('+')">+</button>
    <button id="btn-toggle" onclick="handleButton('toggle')">+/-<span id="tap-cue"></span></button>
    <button onclick="handleButton('0')">0</button>
    <button id="btn-dot" onclick="handleButton('.')">.</button>
    <button class="equals-btn" id="btn-equals" onclick="handleButton('=')">=</button>
</div>

<script src="acaan.js"></script>
<script src="toxic.js"></script>
<script src="engine.js"></script>

<script>
    let currentInput = "";
    const resultEl = document.getElementById('result');

    function handleButton(btn) {
        // 1. Check if ACAAN Stage Manager needs to intervene
        if (isTappingMode && tappingType === 'acaan' && btn === 'C') {
            runAcaanStageManager();
            return;
        }

        // 2. Block keypad if Toxic Tapping is active
        if (isTappingMode) return;

        // 3. Silent Card Input
        if (cardMode && !['toggle', '='].includes(btn)) {
            captureCardData(btn);
            return;
        }

        // 4. Standard Routing
        switch(btn) {
            case 'C': currentInput = ""; break;
            case '%': handlePercentLogic(); break;
            case 'back': currentInput = currentInput.slice(0,-1); break;
            case '=': runCalculation(); break;
            case 'toggle': currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput; break;
            default: appendChar(btn);
        }
        updateUI();
    }

    function appendChar(char) {
        const ops = ['+', '-', '×', '÷', '%'];
        const last = currentInput.slice(-1);
        if (currentInput === "" && ['×', '÷', '%'].includes(char)) return;
        if (ops.includes(last) && ops.includes(char)) currentInput = currentInput.slice(0, -1) + char;
        else currentInput = (currentInput === "0" && !ops.includes(char)) ? char : currentInput + char;
    }

    function runCalculation() {
        try {
            let math = currentInput.replace(/×/g,'*').replace(/÷/g,'/');
            currentInput = eval(math).toString();
            if (cardMode) killCardMode(); 
        } catch(e) { currentInput = "Error"; }
    }

    function updateUI() {
        resultEl.innerText = currentInput || "0";
        let l = resultEl.innerText.length;
        resultEl.style.fontSize = l > 15 ? "2.2rem" : l > 11 ? "3rem" : l > 7 ? "4rem" : "5rem";
        setTimeout(() => resultEl.scrollLeft = resultEl.scrollWidth, 0);
    }
</script>
</body>
</html>
